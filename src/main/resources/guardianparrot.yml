# Меню Хранителей (Guardian Parrot)
menu:
  title: "&bХРАНИТЕЛЬ"
size: 54

# Инфо-предмет
hoe:
  material: GOLDEN_SWORD
  name: "&bХРАНИТЕЛЬ"
  lore:
    - "&7Хранитель убивает любую враждебную сущность"
    - "&7внутри границы Вашего региона"
    - "&7Защищает игроков в регионе от других игроков при PvP"
    - "&7Защищает регион во время его грифа"
    - "&7Можно призвать до 3х &6Хранителей"
    - "&7Нажмите на Яйцо Хранителя и он призовется"
    - "&7Повторное нажатие его удалит"
    - "&7Хранитель имеет &650 &7уровень жизни"
    - "&7При его смерти он возрадится спустя 3 минуты"
    - "&7Каждый взрыв TNT опасен для хранителя"
    - "&7Принося ему урон"
    - "&8--------------------"
    - "&7Хранитель подбирает любой лут внутри региона"
    - "&7сбрасывает его на блок привата"
    - "&7Если установлена воронка у Фермера"
    - "&7весь лут будет собираться в эту воронку"
    - "&7Активация Хранителя стоит &610 &7Аметистов."
    - "&7каждые &630 &7минут Хранитель забирает &65 &7Аметистов"
    - "&7ему тоже нужно питаться"
  slot: 4

# Кнопка возврата
return:
  material: ARROW
  name: "&6ВОЗВРАТ"
  slot: 35
  click_action: toggle_return

