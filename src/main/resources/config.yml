  no-permission: "&cНет прав."
  limit-reached: "&cЛимит приватов достигнут (&e%current%&c/&e%limit%&c)."
  only-player: "&cТолько игрок может использовать команду."
  give-usage: "&cИспользование: /aquaprotection give <player> <amount>"
  givetnt-usage: "&cИспользование: /aquaprivate givetnt <type> <player> <amount>"
  givetnt-type-not-found: "&cТип TNT не найден: &f%type%"
  givetnt-success: "&aВыдали &f%amount% &aшт. TNT типа &f%type% &aигроку &f%player%"
  list-usage: "&cИспользование: /aquaprivate list [player]"

  # /aquaprivate list
  list-header: "&7Приваты игрока &f%player% &7(&f%count%&7):"
  list-empty: "&eУ вас нет приватов."
  list-entry: "&8- &f%world% &7x:&f%x% &7y:&f%y% &7z:&f%z% &8(&7%region%&8)"

  # /aquaprivate home
  home-usage: "&cИспользование: /aquaprivate home [player]"
  home-header: "&7Дома игрока &f%player% &7(&f%count%&7):"
  home-empty: "&eНет установленных приватов."
  home-invalid: "&cНеверная точка телепортации."
  home-hover: "&eНажми, чтобы телепортироваться"
  home-fallback: "&8(Команда: &7%cmd%&8)"
  home-entry: "&8- &f%world% &7x:&f%x% &7y:&f%y% &7z:&f%z% &a[Телепорт]"

  # GUI (fallback)
  home-world-missing: "&cМир не найден: &f%world%"
  home-gui-title: "&bПриваты: &f%player%"
  home-item-name: "&aДом &7(&f%world%&7)"
  home-item-lore:
    - "&7Мир: &f%world%"
    - "&7Координаты: &f%x% &f%y% &f%z%"
    - "&8Нажми, чтобы телепортироваться"
  home-tp-start: "&7Телепортация через &f%seconds%&7с. Не двигайтесь!"
  home-tp-countdown: ""
  home-tp-success: "&aТелепортировано."
  home-tp-cancel: "&cТелепортация отменена (движение)."

  # /aquaprotection give
  give-success: "&aВыдали &f%amount% &aшт. блока привата: &f%block% &aигроку &f%player%"
  level-quest-enabled: "&aПрокачка уровня включена. Выполняйте задания!"
  level-quest-disabled: "&7Прокачка уровня выключена."
  quest-entity-kill: "&7Вы убили сущность- ваш счет %entytyamound%"
  quest-mine: "&7Добыто блоков %minersamound%"
  quest-player-kill: "&7Вы убили игрока. теперь ваш счет %killamound%"
  quest-complete: "&7Уровень привата Успешно повышен до &6%levlprivata%"

  # ФЕРМЕР (активация через перекачку опыта)
  fermer-need-private-level: "&cДля активации фермера нужен уровень привата &f20&c."
  fermer-need-clan: "&cДля активации фермера необходимо иметь свой клан."
  fermer-need-clan-level: "&cДля активации фермера нужен уровень клана &f8&c."
  fermer-exp-started: "&aПерекачка опыта в приват включена. Требуется &f100&a уровней."
  fermer-exp-stopped: "&7Перекачка опыта выключена."
  fermer-exp-complete: "&aАктивация фермера завершена! Теперь можно открыть меню фермера."
  fermer-open-error: "&cНе удалось открыть меню фермера."

  # ХРАНИТЕЛЬ (активация через перекачку опыта)
  guard-need-private-level: "&cДля активации хранителя нужен уровень привата &f20&c."
  guard-need-clan: "&cДля активации хранителя необходимо иметь свой клан."
  guard-need-clan-level: "&cДля активации хранителя нужен уровень клана &f8&c."
  guard-exp-started: "&aПерекачка опыта для хранителя включена. Требуется &f100&a уровней."
  guard-exp-stopped: "&7Перекачка опыта для хранителя выключена."
  guard-exp-complete: "&aАктивация хранителя завершена! Теперь можно открыть меню хранителя."
  guard-open-error: "&cНе удалось открыть меню хранителя."
  player-not-found: "&cИгрок не найден: &f%player%"
  no-blocks: "&cВ конфиге не настроены blocks."

  # Установка/удаление
  disabled-world: "&cВ этом мире запрещено устанавливать приват!"
  overlapping: "&cВаш регион пересекается с другим регионом!"
  created: "&aПриват создан! Владелец: &f%player%"
  removed: "&eПриват удалён."
  not-owner: "&cВы не владелец и не участник привата!"

  # Сообщения входа/выхода (кладутся в WG флаги greeting/farewell)
  enter: "&f&lВы вошли в регион игрока &b&l%owner%"
  leave: "&f&lВы покинули регион игрока &b&l%owner%"

  # /ap add|remove
  ap-usage: "&cИспользование: /ap add <player> | /ap remove <player> | /ap upgrade [private] | /ap upgrade <player> <private>"
  upgrade-usage: "&cИспользование: /ap upgrade  &7(внутри своего привата) &c| /ap upgrade <private> &7(regionId или номер) &c| /ap upgrade <player> <private>"
  upgrade-private-not-found: "&cПриват не найден: &f%private% &7(игрок: &f%player%&7)"
  not-in-private: "&cВы должны стоять внутри своего привата."
  member-added: "&aИгрок &f%player% &aдобавлен в приват."
  member-removed: "&eИгрок &f%player% &eудалён из привата."
  member-already: "&eЭтот игрок уже участник привата."

  # /ap upgrade
  upgrade-success: "&aУровень привата повышен до &f%level%&a. Размер: &f%size%"
  upgrade-max: "&eУ приват-региона уже максимальный уровень (20)."
  upgrade-failed: "&cНе удалось повысить уровень (ошибка WorldGuard/мира)."

  # FermerPets (embedded)
  fermer-need-level: "&cДля доступа к фермеру нужен уровень привата &f20&c."
  fermer-need-clan: "&cДля доступа к фермеру нужен ваш клан."


# Настройки по умолчанию (можно переопределить в blocks.<key>.settings)
settings:
  # Отображение типа привата (%privatetype%)
  privatetype:
    normal: "&aОбычный"
    clan: "&6Клановый"

  # Настройки фермер-привата (%fermerprivat% / %fermerprivattoplivo%)
  fermer:
    active: "&aАктивный"
    inactive: "&cНе активный"
    status:
      available: "&aдоступно"
      locked: "&cнедоступно"
    exp-transfer:
      active: "&6перекачка опыта активна"
      inactive: "&fперекачка опыта не активна"
    slots:
      active: "&2Активен"
      inactive: "&7не активен"
    # Пока топливо пустое (""), позже будет число/формула
    fuel-format: "&e%amount%"

  # Настройки хранителя (%explevlguard%)
  guard:
    # Статус доступа к хранителю (%guardprivat%)
    status:
      available: "&aдоступно"
      locked: "&cнедоступно"

    # Сколько УРОВНЕЙ опыта нужно закачать в приват, чтобы открыть меню Хранителя.
    required-levels: 100

    exp-placeholder:
      # Показывается в меню привата в лоре слота Хранителя
      progress: "&e%current%&7"
      complete: "&2готово"
    exp-transfer:
      active: "&6перекачка опыта активна"
      inactive: "&fперекачка опыта не активна"

    # Формат отображения "топлива" хранителя (%guardprivattoplivo%)
    # Если нужен чисто числом — просто используй %guardprivattoplivo% в лоре.
    fuel-format: "&e%amount%"

  # Тексты плейсхолдеров
  placeholders:
    glow:
      disabled: "&7подсветка отключена"
      enabled: "&2подсветка включена"

  # Звук клика по кликабельным слотам меню привата
  menu-click-sound:
    enabled: true
    sound: UI_BUTTON_CLICK
    volume: 1.0
    pitch: 1.2

  # Прокачка уровня через задания (переключается кликом в menuprivate.yml)
  level-quest:
    enabled: true
    status:
      active: "&6активно"
      inactive: "&7неактивно"
      # Что показывать в плейсхолдере %levloffon% при максимальном уровне (20)
      max: "&2макс уровень"

    # Квесты прокачки можно настраивать ПО УРОВНЯМ привата.
    # Требования из levels.<LEVEL> применяются для апгрейда
    # С ТЕКУЩЕГО уровня <LEVEL> НА СЛЕДУЮЩИЙ.
    # Если секции для уровня нет — используются значения из requirements (ниже).
    # Пример:
    # levels:
    #   1:
    #     entity-kills: 10
    #     player-kills: 0
    #     mine:
    #       material: DIAMOND
    #       amount: 5
    #   2:
    #     entity-kills: 25
    #     player-kills: 5
    #     mine:
    #       material: DIAMOND
    #       amount: 15
    levels: {}

    requirements:
      # Сколько любых НЕ-игроков нужно убить (0 = не требуется)
      entity-kills: 50
      # Сколько игроков нужно убить (0 = не требуется)
      player-kills: 15
      mine:
        # Какой материал добывать
        material: DIAMOND
        # Сколько штук требуется
        amount: 25
  # PvP внутри приват-регионов
  allow-pvp: true
  create-lightning-strike: true
  delete-lightning-strike: true

  # Запрет слияния регионов (если true — нельзя ставить приват, если он пересекается с любым другим WG регионом)
  merge-regions: true

  # Глобальные запреты внутри приват-регионов
  deny-block-break: true
  deny-block-place: true
  deny-chest-open: true
  deny-wither-block-damage: true

  explosions: false
  exclusion-explosions-types: [WITHER_SKULL]
  block-change-wither: false

  # Эффекты при повышении уровня привата
  upgrade-effects:
    enabled: true
    local-chat-radius: 64
    particle: NAUTILUS
    particles-per-tick: 24
    step: 0.5
    duration-ticks: 30
    sound: BLOCK_BEACON_ACTIVATE
    sound-volume: 1.0
    sound-pitch: 1.0

# Блоки привата
blocks:
  DIAMOND_ORE:
    item:
      material: DIAMOND_ORE
      name: "&x&f&b&0&0&0&0М&x&f&b&1&4&0&5а&x&f&b&2&7&0&bл&x&f&c&3&b&1&0ы&x&f&c&4&f&1&6й &x&f&c&6&3&1&bп&x&f&c&7&6&2&0р&x&f&c&8&a&2&6и&x&f&d&9&e&2&bв&x&f&d&b&1&3&1а&x&f&d&c&5&3&6т"
      lore:
        - "&7Установи блок, чтобы создать приват"
        - "&7Размер: &f15x15x15"

    region:
      x_radius: 15
      y_radius: 15   # если -1 — бесконечно вверх/вниз
      z_radius: 15

    holograms:
      enable: true
      height: 1.75
      lines:
        - '&x&f&b&0&0&0&0М&x&f&b&1&4&0&5а&x&f&b&2&7&0&bл&x&f&c&3&b&1&0ы&x&f&c&4&f&1&6й &x&f&c&6&3&1&bп&x&f&c&7&6&2&0р&x&f&c&8&a&2&6и&x&f&d&9&e&2&bв&x&f&d&b&1&3&1а&x&f&d&c&5&3&6т'
        - '&fВладелец: &6%player%'

    settings:
      create-lightning-strike: true
      delete-lightning-strike: true
      merge-regions: true
      deny-block-break: true
      deny-block-place: true
      deny-chest-open: true
      deny-wither-block-damage: true
      explosions: false
      exclusion-explosions-types: [WITHER_SKULL]
      block-change-wither: false

  # Эффекты при повышении уровня привата
  upgrade-effects:
    enabled: true
    local-chat-radius: 64
    particle: NAUTILUS
    particles-per-tick: 24
    step: 0.5
    duration-ticks: 30
    sound: BLOCK_BEACON_ACTIVATE
    sound-volume: 1.0
    sound-pitch: 1.0

# Настройки телепортации для /aquaprivate home
teleport:
  warmup-seconds: 5
  cancel-on-move: true
  sound: "BLOCK_CONDUIT_DEACTIVATE"
  particles:
    enabled: true
    type: "LAVA"
    count: 100
    offset-x: 0.0
    offset-y: 3.0
    offset-z: 0.0
    spread-x: 0.0
    spread-y: 3.0
    spread-z: 0.0
    extra: 10.0
    force: true
    during-countdown: true
    on-arrive: true
  upgrade-local-chat: "&b%player% &7улучшил приват до уровня &e%level%&7. Новый размер: &e%size%x%size%x%size%"