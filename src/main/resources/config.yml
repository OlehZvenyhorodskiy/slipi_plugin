# AquaPrivate by SlepniR
# Java 17 (works on Java 21 servers)
# Поддержка HEX цветов (&x&F&F... и &#RRGGBB) для 1.16+
# Для градиентов/HEX можно использовать https://rgb.birdflop.com/

# Глобальный DEBUG (по умолчанию выключен)
# Если debug.enable: true — в консоль будут выводиться отладочные сообщения.
# Если ключ присутствует и равен false — принудительно выключает debug и в модулях (например, FermerPets).
debug:
  enable: false

# Миры, где запрещена установка блоков привата
disable-worlds:
  - spawnnnNEW

# Черный список материалов, которые НЕЛЬЗЯ ломать внутри привата (даже владельцу/мемберу)
blacklist-break-block:
  - SPAWNER

# Настройки Home
home:
  # Открывать GUI-меню дополнительно к кликабельному чату (полезно если клиент/чат блокирует клики)
  open-gui: true

